name: Deploy to Lightsail

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Java 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Gradle 실행 권한 부여
        run: chmod +x gradlew

      - name: JAR 빌드 (테스트 제외)
        run: ./gradlew clean build -x test

      - name: SSH 에이전트 설정
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.LIGHTSAIL_SSH_KEY }}

      - name: 서버 호스트 키 등록
        run: ssh-keyscan -H ${{ secrets.LIGHTSAIL_HOST }} >> ~/.ssh/known_hosts

      - name: JAR 파일 서버로 전송
        run: |
          scp build/libs/*-SNAPSHOT.jar ${{ secrets.LIGHTSAIL_USERNAME }}@${{ secrets.LIGHTSAIL_HOST }}:/home/ubuntu/app.jar

      - name: 서버 환경변수 파일 생성
        run: |
          ssh ${{ secrets.LIGHTSAIL_USERNAME }}@${{ secrets.LIGHTSAIL_HOST }} "
            echo 'JWT_SECRET=${{ secrets.JWT_SECRET }}' | sudo tee /etc/tastingnote.env > /dev/null
            echo 'DB_URL=${{ secrets.DB_URL }}' | sudo tee -a /etc/tastingnote.env > /dev/null
            echo 'DB_USERNAME=${{ secrets.DB_USERNAME }}' | sudo tee -a /etc/tastingnote.env > /dev/null
            echo 'DB_PASSWORD=${{ secrets.DB_PASSWORD }}' | sudo tee -a /etc/tastingnote.env > /dev/null
            echo 'SLACK_ERROR_WEBHOOK_URL=${{ secrets.SLACK_ERROR_WEBHOOK_URL }}' | sudo tee -a /etc/tastingnote.env > /dev/null
            echo 'SLACK_FEEDBACK_WEBHOOK_URL=${{ secrets.SLACK_FEEDBACK_WEBHOOK_URL }}' | sudo tee -a /etc/tastingnote.env > /dev/null
            sudo chmod 600 /etc/tastingnote.env
          "

      - name: 서버에서 앱 재시작
        run: |
          ssh ${{ secrets.LIGHTSAIL_USERNAME }}@${{ secrets.LIGHTSAIL_HOST }} "sudo systemctl restart tastingnote && echo 배포 완료"