spring:
  application:
    name: tastingnote

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 3600000       # 1시간 (ms)
  refresh-token-expiration: 2592000000   # 30일 (ms)

springdoc:
  swagger-ui:
    path: /tastingnote.swagger
  api-docs:
    path: /api-docs