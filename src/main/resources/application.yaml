spring:
  application:
    name: tastingnote

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 15MB

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
    defer-datasource-initialization: true  # data.sql이 Hibernate DDL 이후 실행되도록 보장

  sql:
    init:
      encoding: UTF-8  # data.sql 한글 인코딩

jwt:
  access-token-expiration: 3600000       # 1시간 (ms)
  refresh-token-expiration: 2592000000   # 30일 (ms)

aws:
  s3:
    bucket: ${AWS_S3_BUCKET}
    region: ${AWS_REGION:ap-northeast-2}

springdoc:
  swagger-ui:
    path: /tastingnote.swagger
  api-docs:
    path: /api-docs